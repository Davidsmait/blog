stroke-width="1.5" opacity="0.45"></line></g><text x="96" y="118" font-family="'DM Sans', sans-serif" font-size="60" font-weight="600" fill="#EDE2C6" opacity="1" letter-spacing="-1">SECADO</text><text x="96" y="158" font-family="'DM Sans', sans-serif" font-size="13" font-weight="300" fill="#C4843A" opacity="1" letter-spacing="5">AL SOL O MECÁNICO</text><g transform="translate(96,240)" opacity="1"><text x="0" y="0" font-family="'DM Sans', sans-serif" font-size="40" font-weight="600" fill="#D4A040">12–18</text><text x="0" y="22" font-family="'DM Sans', sans-serif" font-size="10" font-weight="300" fill="#7A6248" letter-spacing="3">DÍAS</text></g><g transform="translate(96,320)" opacity="1"><text x="0" y="0" font-family="'DM Sans', sans-serif" font-size="40" font-weight="600" fill="#D4A040">10–12%</text><text x="0" y="22" font-family="'DM Sans', sans-serif" font-size="10" font-weight="300" fill="#7A6248" letter-spacing="3">HUMEDAD FINAL</text></g></g></svg></div></div><div style="display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: rgba(20, 20, 20, 0.92); border-top: 1px solid rgba(255, 255, 255, 0.08); width: 100%; max-width: 680px; align-self: center; border-radius: 8px; color: rgb(246, 244, 239); font-family: Inter, system-ui, sans-serif; user-select: none; flex-shrink: 0;"><button title="Return to start (0)" style="width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; color: rgb(246, 244, 239); cursor: pointer; padding: 0px; transition: background 120ms;"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"></path></svg></button><button title="Play/pause (space)" style="width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; background: rgba(255, 25   <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="animations.jsx" data-plugins="transform-react-jsx-source" data-filename="animations.jsx"></script>

  <script type="text/babel" data-plugins="transform-react-jsx-source" data-filename="inline-1">
    const { Stage, useTime, animate, Easing } = window;
    const W = 1280, H = 720;
    const F = "'DM Sans', sans-serif";

    // ── Palette ──────────────────────────────────────────────────────────────
    const C = {
      bg:           '#0E0804',
      cream:        '#EDE2C6',
      creamDim:     '#B8A882',
      amber:        '#C4843A',
      amberLight:   '#E0A855',
      coffeeDark:   '#3E1E0A',
      coffeeMid:    '#7A4825',
      coffeeLight:  '#A06535',
      olive:        '#556630',
      oliveLight:   '#7A8F48',
      cherry:       '#8C2A2A',
      cherryBright: '#C44040',
      gold:         '#D4A040',
      muted:        '#7A6248',
    };

    // ── Helpers ───────────────────────────────────────────────────────────────
    const a = (t, from, start, end, to, ease = Easing.easeOutCubic) =>
      animate({ from, to, start, end, ease })(t);

    const BeanShape = ({ x, y, rx = 18, ry = 28, angle = 0, color = C.coffeeLight, opacity = 1 }) => (
      <g transform={`translate(${x},${y}) rotate(${angle})`} opacity={opacity}>
        <ellipse rx={rx} ry={ry} fill={color} />
        <line x1={0} y1={-ry * 0.8} x2={0} y2={ry * 0.8}
          stroke={C.coffeeDark} strokeWidth={1.5} opacity={0.45} />
      </g>
    );

    // Subtle background grid
    const Grid = ({ opacity = 0.06 }) => (
      <g opacity={opacity}>
        {Array.from({ length: 21 }).map((_, i) => (
          <line key={`v${i}`} x1={i * 64} y1={0} x2={i * 64} y2={H}
            stroke={C.amber} strokeWidth={0.5} />
        ))}
        {Array.from({ length: 12 }).map((_, i) => (
          <line key={`h${i}`} x1={0} y1={i * 64} x2={W} y2={i * 64}
            stroke={C.amber} strokeWidth={0.5} />
        ))}
      </g>
    );

    // ── SCENE 1: INTRO (0–6s) ─────────────────────────────────────────────────
    function IntroScene() {
      const t = useTime();
      if (t > 7) return null;
      const l = t;

      const titleOp  = a(l, 0, 0.4, 2.0, 1);
      const titleY   = a(l, 32, 0.4, 2.0, 0, Easing.easeOutCubic);
      const subOp    = a(l, 0, 1.4, 2.8, 1);
      const lineW    = a(l, 0, 1.8, 3.2, 280);
      const fadeOut  = a(l, 1, 4.8, 6.2, 0, Easing.easeInQuad);

      const ring1R   = a(l, 200, 0, 3, 280, Easing.easeOutCubic);
      const ring2R   = a(l, 140, 0.5, 3.5, 200, Easing.easeOutCubic);
      const rot      = l * 9;

      return (
        <g opacity={fadeOut}>
          <Grid opacity={0.04} />
          {/* Rotating oval rings */}
          <g transform={`translate(${W / 2},${H / 2}) rotate(${rot})`}>
            <ellipse rx={ring1R} ry={ring1R * 0.55} fill="none"
              stroke={C.amber} strokeWidth={1} opacity={0.14} />
          </g>
          <g transform={`translate(${W / 2},${H / 2}) rotate(${-rot * 0.65})`}>
            <ellipse rx={ring2R * 1.3} ry={ring2R * 0.4} fill="none"
              stroke={C.olive} strokeWidth={0.8} opacity={0.1} />
          </g>
          {/* Floating dots */}
          {Array.from({ length: 18 }).map((_, i) => {
            const px = 80 + (i * 137.5) % (W - 160);
            const py = 60 + (i * 89.3) % (H - 120);
            const opa = 0.07 + 0.08 * Math.sin(l * 0.6 + i * 0.9);
            const dy  = Math.sin(l * 0.4 + i * 0.7) * 6;
            return <circle key={i} cx={px} cy={py + dy} r={1.5 + (i % 3)} fill={C.amber} opacity={opa} />;
          })}
          {/* CAFÉ */}
          <text x={W / 2} y={H / 2 - 28 + titleY}
            textAnchor="middle" dominantBaseline="middle"
            fontFamily={F} fontSize={200} fontWeight={600}
            fill={C.cream} opacity={titleOp} letterSpacing={-10}>CAFÉ</text>
          {/* Line */}
          <rect x={W / 2 - lineW / 2} y={H / 2 + 60} width={lineW} height={1.5}
            fill={C.amber} rx={1} opacity={subOp * 0.6} />
          {/* Subtitle */}
          <text x={W / 2} y={H / 2 + 92}
            textAnchor="middle" fontFamily={F} fontSize={13} fontWeight={300}
            fill={C.amber} opacity={subOp} letterSpacing={12}>DEL GRANO A LA TAZA</text>
        </g>
      );
    }

    // ── SCENE 2: PROCESO DE BENEFICIO (5–11s) ─────────────────────────────────
    function BeneficioTitle() {
      const t = useTime();
      if (t < 4.5 || t > 12) return null;
      const l = t - 5;

      const fadeIn  = a(l, 0, 0.5, 2, 1);
      const titleIn = a(l, 0, 0.8, 2.2, 1, Easing.easeOutBack);
      const lineW   = a(l, 0, 1.2, 2.8, 320);
      const fadeOut = a(l, 1, 4.5, 6, 0, Easing.easeInQuad);

      const rot = l * 6;
      const circleS = a(l, 0.5, 0, 2, 1, Easing.easeOutCubic);

      return (
        <g opacity={Math.min(fadeIn, fadeOut)}>
          {/* Background accent circles */}
          <circle cx={160} cy={H / 2} r={260 * circleS} fill={C.olive} opacity={0.06} />
          <circle cx={W - 100} cy={H * 0.35} r={180 * circleS} fill={C.amber} opacity={0.05} />
          {/* Rotating diamond */}
          <g transform={`translate(${W / 2},${H / 2}) rotate(${rot})`} opacity={0.1}>
            <rect x={-240} y={-240} width={480} height={480}
              fill="none" stroke={C.cream} strokeWidth={0.8} transform="rotate(45)" />
          </g>
          {/* "PROCESO DE" label */}
          <text x={W / 2} y={H / 2 - 80}
            textAnchor="middle" fontFamily={F} fontSize={12} fontWeight={300}
            fill={C.amber} opacity={fadeIn} letterSpacing={10}>PROCESO DE</text>
          {/* Main title */}
          <text x={W / 2} y={H / 2 + 16}
            textAnchor="middle" fontFamily={F} fontSize={108} fontWeight={600}
            fill={C.cream} opacity={titleIn} letterSpacing={-4}>BENEFICIO</text>
          {/* Underline */}
          <rect x={W / 2 - lineW / 2} y={H / 2 + 72} width={lineW} height={1.5}
            fill={C.amber} rx={1} opacity={lineW > 0 ? 0.5 : 0} />
          {/* Sub */}
          <text x={W / 2} y={H / 2 + 104}
            textAnchor="middle" fontFamily={F} fontSize={16} fontWeight={300}
            fill={C.coffeeLight} opacity={fadeIn} letterSpacing={6}>DEL CAFÉ</text>
        </g>
      );
    }

    // ── SCENE 3: DESPULPADO (10–22s) ─────────────────────────────────────────
    function DespulpadoScene() {
      const t = useTime();
      if (t < 9.5 || t > 23) return null;
      const l = t - 10;

      const fadeIn    = a(l, 0, 0, 1.5, 1);
      const fadeOut   = a(l, 1, 10.5, 12, 0, Easing.easeInQuad);
      const overall   = Math.min(fadeIn, fadeOut);

      const titleIn   = a(l, 0, 0.6, 2.2, 1);
      const elemIn    = a(l, 0, 1.5, 3.5, 1);

      // Cherry scale pop in
      const cherryScale = a(l, 0, 0.8, 2.8, 1, Easing.easeOutBack);
      const cherryR = 115 * cherryScale;

      // Split: halves pull apart
      const splitX    = a(l, 0, 3.5, 7.5, 95, Easing.easeInOutCubic);
      const skinOp    = a(l, 1, 6.5, 8.5, 0, Easing.easeInCubic);

      // Inner reveals
      const mucilageR = a(l, 40, 3.5, 6.5, 80, Easing.easeOutCubic);
      const mucilageOp = a(l, 0, 3.2, 5.5, 0.55, Easing.easeOutCubic) *
                         a(l, 1, 8, 10, 0, Easing.easeInCubic);
      const beanS     = a(l, 0, 5, 8, 1, Easing.easeOutBack);
      const beanOp    = a(l, 0, 4.8, 7.5, 1);

      // Particles
      const partP     = a(l, 0, 4, 8, 1);

      // Ripple rings
      const ripple    = (off) => (l + off) % 3 / 3;

      const cx = W * 0.64, cy = H / 2;

      return (
        <g opacity={overall}>
          <Grid opacity={0.04} />

          {/* Left panel: title + info */}
          <text x={96} y={118} fontFamily={F} fontSize={60} fontWeight={600}
            fill={C.cream} opacity={titleIn} letterSpacing={-1}>DESPULPADO</text>
          <text x={96} y={158} fontFamily={F} fontSize={13} fontWeight={300}
            fill={C.amber} opacity={titleIn} letterSpacing={5}>EXTRACCIÓN DE LA CEREZA</text>

          {/* Process steps */}
          {[
            { y: 240, dot: C.cherryBright, label: 'Piel exterior', sub: 'Epidermis roja' },
            { y: 310, dot: C.gold,         label: 'Mucílago',      sub: 'Capa azucarada' },
            { y: 380, dot: C.oliveLight,   label: 'Grano verde',   sub: 'Café pergamino' },
          ].map(({ y, dot, label, sub }, i) => {
            const showAt = a(l, 0, 2 + i * 1.2, 3.2 + i * 1.2, 1);
            return (
              <g key={i} transform={`translate(96, ${y})`} opacity={showAt * elemIn}>
                <circle cx={0} cy={0} r={5} fill={dot} />
                <text x={20} y={-4} fontFamily={F} fontSize={14} fontWeight={500}
                  fill={C.cream}>{label}</text>
                <text x={20} y={14} fontFamily={F} fontSize={11} fontWeight={300}
                  fill={C.muted}>{sub}</text>
              </g>
            );
          })}

          {/* Cherry center group */}
          <g transform={`translate(${cx},${cy})`}>
            {/* Outer ripple rings */}
            {[0, 1.2, 2.4].map((off, i) => {
              const rp = ripple(off);
              return (
                <circle key={i} r={cherryR + 20 + rp * 80}
                  fill="none" stroke={C.cherry}
                  strokeWidth={1} opacity={(1 - rp) * 0.12 * fadeIn} />
              );
            })}

            {/* Green bean core */}
            <g opacity={beanOp}>
              <ellipse rx={46 * beanS} ry={72 * beanS} fill={C.olive} />
              <ellipse rx={40 * beanS} ry={65 * beanS} fill={C.oliveLight} opacity={0.4} />
              <line x1={0} y1={-58 * beanS} x2={0} y2={58 * beanS}
                stroke={C.coffeeDark} strokeWidth={2} opacity={0.5} />
            </g>

            {/* Mucilage ring */}
            <ellipse rx={mucilageR} ry={mucilageR * 0.92}
              fill={C.gold} opacity={mucilageOp} />

            {/* Cherry skin — LEFT half */}
            <g transform={`translate(${-splitX}, 0)`} opacity={skinOp}>
              <path d={`M 0,-${cherryR} A ${cherryR} ${cherryR} 0 0,0 0,${cherryR} Z`}
                fill={C.cherry} />
              <path d={`M 0,-${cherryR * 0.8} A ${cherryR * 0.8} ${cherryR * 0.8} 0 0,0 0,${cherryR * 0.8} Z`}
                fill={C.cherryBright} opacity={0.3} />
            </g>
            {/* Cherry skin — RIGHT half */}
            <g transform={`translate(${splitX}, 0)`} opacity={skinOp}>
              <path d={`M 0,-${cherryR} A ${cherryR} ${cherryR} 0 1,1 0,${cherryR} Z`}
                fill={C.cherry} />
            </g>

            {/* Particles flying off */}
            {Array.from({ length: 10 }).map((_, i) => {
              const angle = (i / 10) * Math.PI * 2;
              const dist  = 100 + partP * (160 + i * 12);
              const pOp   = partP * (1 - partP * 0.85) * (splitX > 5 ? 1 : 0);
              return (
                <circle key={i}
                  cx={Math.cos(angle) * dist}
                  cy={Math.sin(angle) * dist}
                  r={3 + (i % 4) * 1.5}
                  fill={i % 2 === 0 ? C.cherry : C.amber}
                  opacity={Math.max(0, pOp)} />
              );
            })}
          </g>
        </g>
      );
    }

    // ── SCENE 4: LAVADO (21–33s) ──────────────────────────────────────────────
    function LavadoScene() {
      const t = useTime();
      if (t < 20.5 || t > 34) return null;
      const l = t - 21;

      const fadeIn  = a(l, 0, 0, 1.5, 1);
      const fadeOut = a(l, 1, 10.5, 12, 0, Easing.easeInQuad);
      const overall = Math.min(fadeIn, fadeOut);

      const titleIn = a(l, 0, 0.6, 2.2, 1);
      const elemIn  = a(l, 0, 1.5, 3.5, 1);

      // Animated wave path
      const wavePath = (baseY, amp, freq, speedMult) => {
        const pts = [];
        for (let x = 0; x <= W; x += 12) {
          const y = baseY + Math.sin(x * freq + l * speedMult) * amp;
          pts.push(`${x},${y}`);
        }
        return `M 0,${H} L ${pts.join(' L ')} L ${W},${H} Z`;
      };

      const waves = [
        { baseY: H * 0.72, amp: 22, freq: 0.007, speed: 1.8, color: C.amber, op: 0.14 },
        { baseY: H * 0.67, amp: 18, freq: 0.011, speed: -1.4, color: C.coffeeLight, op: 0.1 },
        { baseY: H * 0.62, amp: 28, freq: 0.005, speed: 2.2, color: C.amber, op: 0.07 },
      ];

      // Drops
      const drops = Array.from({ length: 7 }).map((_, i) => {
        const period = 2.4;
        const lt = ((l + i * 0.35) % period) / period;
        const x  = 280 + i * 130;
        const y  = 160 + lt * 300;
        const op = lt < 0.75 ? 0.7 : (1 - (lt - 0.75) / 0.25) * 0.7;
        const ry = 5 + lt * 5;
        return { x, y, op, ry };
      });

      // Ripples
      const ripples = Array.from({ length: 5 }).map((_, i) => {
        const period = 3.2;
        const lt = ((l + i * 0.65) % period) / period;
        const x  = 300 + i * 155;
        const r  = lt * 75;
        const op = (1 - lt) * 0.25;
        return { x, r, op };
      });

              <circle key={i} cx={bx} cy={by} r={2 + (i % 3)}

    }

    // ── SCENE 5: SECADO (32–44s) ──────────────────────────────────────────────
    function SecadoScene() {
      const t = useTime();
      if (t < 31.5 || t > 45) return null;
      const l = t - 32;

      const fadeIn  = a(l, 0, 0, 1.5, 1);
      const fadeOut = a(l, 1, 10.5, 12, 0, Easing.easeInQuad);
      const overall = Math.min(fadeIn, fadeOut);

      const titleIn = a(l, 0, 0.6, 2.2, 1);
      const elemIn  = a(l, 0, 1.5, 3.5, 1);

      const sunScale = 1 + 0.04 * Math.sin(l * 1.8);
      const numRays  = 20;

      // Heat waves
      const hWave = (i) => {
        const prog = ((l * 0.28 + i * 0.22) % 1);
        const y    = H * 0.42 - prog * 130;
        const op   = (1 - prog) * 0.38;
        const pts  = [];
        for (let x = W * 0.28; x < W * 0.75; x += 24) {
          pts.push(`${x},${y + Math.sin(x * 0.025 + l * 2.2 + i) * 9}`);
        }
        return { pts: pts.join(' '), op };
      };

      const beanPts = [
        { x: 265, y: 420, a: 12 }, { x: 370, y: 412, a: -14 },
        { x: 475, y: 422, a: 25 }, { x: 575, y: 414, a: -6 },
        { x: 675, y: 420, a: 18 }, { x: 775, y: 413, a: -22 },
        { x: 870, y: 421, a: 9 },  { x: 960, y: 416, a: -16 },
        { x: 1050, y: 420, a: 20 },
      ];

      return (
        <g opacity={overall}>
          <Grid opacity={0.04} />

          {/* Sun */}
          <g transform={`translate(${W / 2}, 160) scale(${sunScale})`} opacity={elemIn}>
            {Array.from({ length: numRays }).map((_, i) => {
              const angle = (i / numRays) * Math.PI * 2;
              const r1 = 62, r2 = 82 + (i % 3) * 10;
              const pulse = 0.4 + 0.4 * Math.sin(l * 2 + i * 0.6);
              return (
                <line key={i}
                  x1={Math.cos(angle) * r1} y1={Math.sin(angle) * r1}
                  x2={Math.cos(angle) * r2} y2={Math.sin(angle) * r2}
                  stroke={C.gold} strokeWidth={2.5} opacity={pulse} />
              );
            })}
            <circle r={58} fill={C.gold} opacity={0.18} />
            <circle r={44} fill={C.gold} opacity={0.35} />
            <circle r={28} fill={C.cream} opacity={0.85} />
          </g>

          {/* Heat waves */}
          {Array.from({ length: 8 }).map((_, i) => {
            const hw = hWave(i);
            return (
              <polyline key={i} points={hw.pts}
                fill="none" stroke={C.gold} strokeWidth={1.5}
                opacity={hw.op * elemIn} />
            );
          })}

          {/* Drying bed surface */}
          <rect x={220} y={440} width={870} height={3}
            fill={C.coffeeDark} rx={1.5} opacity={elemIn * 0.8} />
          <rect x={220} y={440} width={870} height={60}
            fill={C.coffeeDark} rx={0} opacity={elemIn * 0.06} />

          {/* Beans */}
          {beanPts.map((b, i) => {
            const shimmer = 0.8 + 0.2 * Math.sin(l * 0.6 + i * 0.8);
            return (
              <BeanShape key={i} x={b.x} y={b.y}
                rx={15} ry={24} angle={b.a}
                color={C.coffeeLight} opacity={shimmer * elemIn} />
            );
          })}

          {/* Title block */}
          <text x={96} y={118} fontFamily={F} fontSize={60} fontWeight={600}
            fill={C.cream} opacity={titleIn} letterSpacing={-1}>SECADO</text>
          <text x={96} y={158} fontFamily={F} fontSize={13} fontWeight={300}
            fill={C.amber} opacity={titleIn} letterSpacing={5}>AL SOL O MECÁNICO</text>

          {[
            { y: 240, label: '12–18', unit: 'DÍAS' },
            { y: 320, label: '10–12%', unit: 'HUMEDAD FINAL' },
          ].map(({ y, label, unit }, i) => {
            const showAt = a(l, 0, 2 + i * 1, 3 + i * 1, 1);
            return (
              <g key={i} transform={`translate(96,${y})`} opacity={showAt * elemIn}>
                <text x={0} y={0} fontFamily={F} fontSize={40} fontWeight={600}
                  fill={C.gold}>{label}</text>
                <text x={0} y={22} fontFamily={F} fontSize={10} fontWeight={300}
                  fill={C.muted} letterSpacing={3}>{unit}</text>
              </g>
            );
          })}
        </g>
      );
    }

    // ── SCENE 8: GOTEO (56–65s) ───────────────────────────────────────────────

            {/* Coffee grounds */}

    // ── SCENE 9: INMERSIÓN + OUTRO (64–73s) ───────────────────────────────────
    function InmersionScene() {
      const t = useTime();
      if (t < 63.5 || t > 74) return null;
      const l = t - 64;

      const fadeIn  = a(l, 0, 0, 2, 1);
      const fadeOut = a(l, 1, 7.5, 9, 0, Easing.easeInQuad);
      const overall = Math.min(fadeIn, fadeOut);

      const titleIn    = a(l, 0, 0.6, 2.2, 1);
      const elemIn     = a(l, 0, 1.5, 3.5, 1);
      const plungerY   = a(l, 0, 4, 7.5, 215, Easing.easeInOutCubic);
      const outroProg  = a(l, 0, 8.2, 9.8, 1, Easing.easeInCubic);

      const mx = W * 0.62;

      // Bubbles inside the press
      const bubbles = Array.from({ length: 14 }).map((_, i) => {
        const period = 4.5 + i * 0.2;
        const lt = ((l + i * 1.1) % period) / period;
        const bx = -72 + i * 11;
        const startY = 340 - plungerY * 0.5;
        const by = startY - lt * 240;
        const br = 1.5 + (i % 4) * 0.8;
        const op = (lt < 0.5 ? lt / 0.3 : (1 - lt) / 0.3) * 0.5;
        return { bx, by, br, op: Math.max(0, op) };
      });

      return (
        <g opacity={overall}>
          <Grid opacity={0.04} />

          <text x={96} y={118} fontFamily={F} fontSize={60} fontWeight={600}
            fill={C.cream} opacity={titleIn} letterSpacing={-1}>INMERSIÓN</text>
          <text x={96} y={158} fontFamily={F} fontSize={13} fontWeight={300}
            fill={C.amber} opacity={titleIn} letterSpacing={5}>CONTACTO TOTAL</text>

          {[
            { y: 250, val: '93–96°C', sub: 'TEMPERATURA' },
            { y: 330, val: '4–8 min', sub: 'INMERSIÓN' },
            { y: 410, val: '1:12',    sub: 'RATIO CAFÉ/AGUA' },
            { y: 490, val: 'Metálico', sub: 'FILTRO' },
          ].map(({ y, val, sub }, i) => {
            const showAt = a(l, 0, 1.5 + i * 0.5, 2.5 + i * 0.5, 1);
            return (
              <g key={i} transform={`translate(96,${y})`} opacity={showAt * elemIn}>
                <text x={0} y={0} fontFamily={F} fontSize={30} fontWeight={600}
                  fill={C.gold}>{val}</text>
                <text x={0} y={20} fontFamily={F} fontSize={10} fontWeight={300}
                  fill={C.muted} letterSpacing={3}>{sub}</text>
              </g>
            );
          })}

          {/* French press illustration */}
          <g transform={`translate(${mx}, 90)`} opacity={elemIn}>
            {/* Outer glass cylinder */}
            <rect x={-85} y={10} width={170} height={380} fill={C.coffeeDark} rx={10} opacity={0.85} />
            {/* Glass highlight */}
            <rect x={-79} y={14} width={14} height={372} fill={C.cream} rx={7} opacity={0.05} />

            {/* Coffee liquid fill */}
            <rect x={-78} y={16} width={156} height={368} fill={C.coffeeMid} rx={8} opacity={0.55} />

            {/* Upper water layer */}
            <rect x={-78} y={16} width={156} height={plungerY}
              fill={C.amber} rx={8} opacity={0.12} />

            {/* Beans floating in brew */}
            {[
              { x: -40, y: 240, a: 18 }, { x: 0, y: 255, a: -14 },
              { x: 40, y: 238, a: 30 },  { x: -52, y: 290, a: -6 },
              { x: 52, y: 282, a: 12 },  { x: 10, y: 310, a: -22 },
            ].map((b, i) => {
              const bob = Math.sin(l * 0.55 + i * 1.2) * 6;
              return (
                <BeanShape key={i} x={b.x} y={b.y + bob}
                  rx={11} ry={17} angle={b.a + Math.sin(l * 0.4 + i) * 3}
                  color={C.coffeeDark} opacity={0.65} />
              );
            })}

            {/* Bubbles */}
            {bubbles.map((b, i) => (
              <circle key={i} cx={b.bx} cy={b.by}
                r={b.br} fill="none"
                stroke={C.cream} strokeWidth={0.7} opacity={b.op * elemIn} />
            ))}

            {/* Plunger filter disc */}
            <rect x={-72} y={plungerY + 10} width={144} height={8}
              fill={C.coffeeLight} rx={3} opacity={0.9} />
            {/* Mesh pattern on disc */}
            {[-36, 0, 36].map((dx, i) => (
              <rect key={i} x={dx - 2} y={plungerY + 11} width={4} height={6}
                fill={C.coffeeDark} opacity={0.5} rx={1} />
            ))}
            {/* Plunger rod */}
            <rect x={-5} y={-70} width={10} height={plungerY + 18}
              fill={C.cream} rx={4} opacity={0.45} />
            {/* Knob */}
            <rect x={-24} y={-70} width={48} height={20}
              fill={C.cream} rx={6} opacity={0.45} />

            {/* Base */}
            <rect x={-92} y={390} width={184} height={18}
              fill={C.coffeeDark} rx={6} opacity={0.9} />
          </g>

          {/* OUTRO overlay */}
          <g opacity={outroProg}>
            <rect x={0} y={0} width={W} height={H} fill={C.bg} />
            {/* Coffee cup icon */}
            <g transform={`translate(${W / 2}, ${H / 2 - 36})`}>
              <ellipse rx={48} ry={8} cy={52} fill={C.coffeeDark} opacity={0.8} />
              <path d="M -40,-10 L -32,52 Q 0,62 32,52 L 40,-10 Z"
                fill={C.coffeeDark} opacity={0.85} />
              <ellipse rx={36} ry={6} cy={2} fill={C.coffeeMid} opacity={0.9} />
              <ellipse rx={28} ry={4} cy={2} fill={C.gold} opacity={0.5} />
              {/* Steam lines */}
              {[-16, 0, 16].map((dx, i) => {
                const wave = Math.sin(l * 2 + i) * 5;
                return (
                  <path key={i}
                    d={`M ${dx},-15 Q ${dx + wave},-32 ${dx},-48 Q ${dx - wave},-64 ${dx},-78`}
                    fill="none" stroke={C.amber} strokeWidth={1.5}
                    strokeLinecap="round" opacity={0.35 * outroProg} />
                );
              })}
            </g>
            {/* End text */}
            <text x={W / 2} y={H / 2 + 55}
              textAnchor="middle" fontFamily={F} fontSize={13} fontWeight={300}
              fill={C.amber} opacity={outroProg} letterSpacing={12}>DEL GRANO A LA TAZA</text>
            <text x={W / 2} y={H / 2 + 82}
              textAnchor="middle" fontFamily={F} fontSize={11} fontWeight={200}
              fill={C.muted} opacity={outroProg * 0.7} letterSpacing={6}>CAFÉ · BENEFICIO · EXTRACCIÓN</text>
          </g>
        </g>
      );
    }

    // ── APP ───────────────────────────────────────────────────────────────────
    function App() {
      return (
        <Stage width={W} height={H} duration={73} background={C.bg}>
          <svg
            style={{ position: 'absolute', top: 0, left: 0, overflow: 'visible' }}
            width={W} height={H}>
            <IntroScene />
            <BeneficioTitle />
            <DespulpadoScene />
            <LavadoScene />
            <SecadoScene />
            <ExtractionTitle />
            <EspressoScene />
            <GoteoScene />
            <InmersionScene />
          </svg>
        </Stage>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>


</body></html>
